# Where Truncation Runs in the Loop

The agent loop has one safe place to manage context: between inner-loop iterations, before the next API call.

```
inner loop:
*   [HOOK: manage context here]
    response = client.messages.create(...)
    if stop_reason == "tool_use":
        execute tools, append results
    else:
        break
```

- Can't shrink a request after it's sent
- Can't truncate inside an active tool exchange
- Need the most recent `usage.input_tokens` to decide

???
The hook point is the only safe placement. Students will try to call truncation in the wrong place — after the response, inside the tool branch — and produce broken behavior.

# The Naive One-Liner

```python
def sliding_window(messages, n):
    return messages[-n:]
```

This compiles. It runs. It will silently corrupt your agent.

The messages array has structure that a blind slice ignores. Two API constraints make this concrete.

???
The point: a working-looking line of code is not a working line of code. The next two slides show what's actually required.

---

# Constraint 1: Pair Integrity

.split-left[
Every `tool_use` block in an assistant message must be followed by its matching `tool_result` in the next user message.

A cut between them produces:

```
400 Bad Request: messages: tool_use ids
found without tool_result blocks
immediately after
```

In a multi-step session roughly half of all messages contain `tool_result` blocks. A random cut has a high chance of orphaning a pair.
]

]

# Constraint 2: Alternating Roles

The API requires `user` and `assistant` roles to alternate. Two consecutive same-role messages are rejected.

- Sliding window's contiguous tail satisfies this trivially
- Anchor preservation (next section) is what creates the problem
- Same fix shape: a small post-processing pass

???
This is the constraint students miss. Naming both constraints up front sets up the anchor section.

---

# The Pair-Aware Walk

A safe cut point is a **user message that is not a `tool_result`**.

- Compute the candidate cut: `len(messages) - keep_last_n`
- If the message at that index is not safe, walk forward until you find one
- Cut at the first safe boundary

The kept window may be smaller than `keep_last_n` requested — but it is never broken.

.callout[Walking forward trades exact size for correctness. There is no point keeping the requested number of messages if the API rejects them.]

???
Walking forward (toward newer messages) is the deliberate choice — sliding window is supposed to favor recency.

---

# Anchor Preservation

The first user message is almost always the original task description.

- The user asks: "Refactor the database layer to use connection pooling."
- 20 messages later, sliding window has dropped that message
- The agent now proposes a new design from scratch — it forgot the goal

**Fix:** if the first user message is not in the kept window, prepend it.

???
The anchor problem is the most common failure mode of sliding window. Students will see it in Lab 5 if they skip this step.

---

# The Side Effect — Two User Messages Adjacent

The pair-aware walk lands on a user message (that's the safe-boundary rule).

Prepending the anchor — also a user message — creates two adjacent users. The API rejects the next call.

```
[anchor]   user: "Refactor the database layer..."
[ack]      assistant: "Understood."         ← inserted
[cut+0]    user: "Now update models/user.py..."
[cut+1]    assistant: [tool_use edit_file]
```

The alternating-roles pass walks the kept list and inserts a one-line ack wherever two same-role messages are adjacent.

.info[Both passes — pair-aware walk and alternating-roles repair — will be reused by selective preservation in Lecture 7.2.]

???
The two-pass design is what makes the function safe. Both passes are cheap and both are mandatory. Pulling them out as helpers pays off in 7.2.

# What the Demo Shows

12-message conversation, `keep_last_n=6`:

| Configuration | Result |
|---|---|
| Naive `messages[-6:]` | Orphans a `tool_result` — API rejects |
| Pair-aware, no anchor | 4 messages — walked forward to safe boundary |
| Pair-aware, anchor preserved | 6 messages — anchor + ack + safe tail |

The function asked for 6, returned 4 in one case and 6 in another. Both are valid. Both preserve pair integrity. The anchored version preserves the original task.

???
60 seconds. The numbers tell the story. Asked for 6, got 4 — the function correctly traded exact size for API correctness.

---

# Key Takeaways

1. **One hook point** — between inner-loop iterations, before the next API call
2. **Two API constraints** — pair integrity and alternating roles
3. **Walk forward to a safe cut** — a user message that is not a `tool_result`
4. **Anchor the goal** — prepend the first user message; insert a synthetic ack to keep roles alternating
5. **Trades exact size for correctness** — the kept window may be smaller than requested but is always valid
